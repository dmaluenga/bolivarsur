<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes Barrio Bolívar - Chatbot Flotante</title>
    <!-- Bootstrap 5 (para estilos base y grid) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Reset y fondo */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Contenedor de contenido de fondo (ejemplo) */
        .page-content {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 40px;
            color: white;
            text-align: center;
        }
        .page-content h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .page-content p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* -------- CHAT FLOATING WIDGET -------- */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        /* Botón flotante (abrir/cerrar) */
        .chat-toggle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .chat-toggle-btn .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 12px;
        }

        /* Ventana del chat */
        .chat-window {
            width: 380px;
            max-width: 90vw;
            height: 550px;
            max-height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none; /* oculta por defecto */
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 10px;
            animation: slideUp 0.3s ease-out;
        }
        .chat-window.open {
            display: flex;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header del chat */
        .chat-header {
            background: linear-gradient(90deg, #2c3e50, #34495e);
            color: white;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-header h5 {
            margin: 0;
            font-weight: 600;
        }
        .chat-header .btn-close-min {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.8;
        }
        .chat-header .btn-close-min:hover {
            opacity: 1;
        }

        /* Cuerpo del chat (mensajes) */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .message.bot {
            justify-content: flex-start;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.bot .bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.user .bubble {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message .bubble .btn-categoria {
            margin: 4px;
            border-radius: 20px;
            font-size: 12px;
            padding: 4px 12px;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            transition: 0.2s;
            cursor: pointer;
        }
        .message .bubble .btn-categoria:hover {
            background: #3498db;
            color: white;
        }
        .message .bubble .btn-categoria.seleccionada {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }
        .message .bubble input[type="text"],
        .message .bubble input[type="email"],
        .message .bubble input[type="tel"],
        .message .bubble textarea {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 6px;
            transition: border 0.2s;
        }
        .message .bubble input:focus,
        .message .bubble textarea:focus {
            border-color: #667eea;
            outline: none;
        }
        .message .bubble .btn-enviar-datos {
            margin-top: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            transition: 0.3s;
            width: 100%;
        }
        .message .bubble .btn-enviar-datos:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        .message .bubble .btn-finalizar {
            margin-top: 8px;
            background: #28a745;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            transition: 0.3s;
        }
        .message .bubble .btn-finalizar:hover {
            background: #218838;
            transform: scale(1.02);
        }
        .message .bubble .btn-finalizar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message .bubble .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 4px;
        }
        .footer-chat {
            padding: 8px 15px;
            background: #f1f1f1;
            text-align: center;
            font-size: 11px;
            color: #777;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        /* Responsive */
        @media (max-width: 480px) {
            .chat-window {
                width: 100vw;
                max-width: 100vw;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                bottom: 0;
                right: 0;
            }
            .chat-toggle-btn {
                width: 56px;
                height: 56px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<!-- Contenido de fondo (ejemplo) -->
<div class="page-content">
    <h1><i class="fas fa-building"></i> Barrio Bolívar</h1>
    <p>Bienvenido al sistema de solicitudes comunitarias.</p>
    <p><i class="fas fa-arrow-down"></i> Haz clic en el botón de chat para iniciar.</p>
</div>

<!-- WIDGET CHAT -->
<div class="chat-widget">
    <!-- Ventana del chat -->
    <div class="chat-window" id="chatWindow">
        <!-- Header -->
        <div class="chat-header">
            <h5><i class="fas fa-robot"></i> Asistente</h5>
            <button class="btn-close-min" id="btnCloseChat" aria-label="Cerrar chat">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <!-- Cuerpo (mensajes) -->
        <div class="chat-body" id="chatBody">
            <!-- Los mensajes se inyectarán aquí -->
        </div>
        <!-- Footer -->
        <div class="footer-chat">
            Consejo Comunal Barrio Bolívar
        </div>
    </div>
    <!-- Botón flotante -->
    <button class="chat-toggle-btn" id="chatToggleBtn">
        <i class="fas fa-comment-dots"></i>
        <span class="badge" id="notifBadge" style="display:none;">1</span>
    </button>
</div>

<script>
    // ============================================================
    // CONFIGURACIÓN FIREBASE (reemplazar con tus credenciales)
    // ============================================================
    const firebaseConfig = {
	  apiKey: "AIzaSyDJ-O6KlsqVtwy1HjeAXfgvkdz0Tq2c4Uc",
	  authDomain: "proyecto-103-bolivar-sur-35fb8.firebaseapp.com",
	  projectId: "proyecto-103-bolivar-sur-35fb8",
	  storageBucket: "proyecto-103-bolivar-sur-35fb8.firebasestorage.app",
	  messagingSenderId: "289155082464",
	  appId: "1:289155082464:web:2349c86b4ff1e0c1ac8885"
	};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let step = 'inicio'; // 'inicio' | 'datos' | 'categoria' | 'descripcion' | 'final'
    let userData = {};   // almacena los datos ingresados
    let categoriaSeleccionada = '';
    let descripcionEscrita = '';

    const chatBody = document.getElementById('chatBody');
    const chatWindow = document.getElementById('chatWindow');
    const toggleBtn = document.getElementById('chatToggleBtn');
    const closeBtn = document.getElementById('btnCloseChat');
    const notifBadge = document.getElementById('notifBadge');

    // ============================================================
    // FUNCIONES AUXILIARES
    // ============================================================
    function addMessage(text, isBot = true, extraHtml = '') {
        const div = document.createElement('div');
        div.className = `message ${isBot ? 'bot' : 'user'}`;
        div.innerHTML = `<div class="bubble">${text} ${extraHtml}</div>`;
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function clearChat() {
        chatBody.innerHTML = '';
    }

    // Mostrar/ocultar ventana
    function openChat() {
        chatWindow.classList.add('open');
        notifBadge.style.display = 'none';
        // Si es primera vez, inicia el flujo
        if (step === 'inicio') {
            iniciarFlujo();
        }
    }

    function closeChat() {
        chatWindow.classList.remove('open');
    }

    // ============================================================
    // FLUJO DE CONVERSACIÓN (paso a paso)
    // ============================================================
    function iniciarFlujo() {
        step = 'datos';
        clearChat();
        // Mensaje de bienvenida
        addMessage('👋 ¡Hola! Soy el asistente del Consejo Comunal Barrio Bolívar. Para iniciar tu solicitud, por favor ingresa tus datos personales.', true);
        // Mostrar formulario de datos
        mostrarFormularioDatos();
    }

    // ---------- PASO 1: DATOS PERSONALES ----------
    function mostrarFormularioDatos() {
        // Verificar si hay datos en localStorage
        const stored = localStorage.getItem('solicitante_data');
        let nombre = '', apellido = '', cedula = '', direccion = '', email = '', telefono = '';
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                nombre = parsed.nombre || '';
                apellido = parsed.apellido || '';
                cedula = parsed.cedula || '';
                direccion = parsed.direccion || '';
                email = parsed.email || '';
                telefono = parsed.telefono || '';
            } catch(e) {}
        }

        const html = `
            <div style="width:100%;">
                <div class="row g-2">
                    <div class="col-6"><input type="text" class="form-control form-control-sm" id="f_nombre" placeholder="Nombre" value="${nombre}" required></div>
                    <div class="col-6"><input type="text" class="form-control form-control-sm" id="f_apellido" placeholder="Apellido" value="${apellido}" required></div>
                    <div class="col-6"><input type="text" class="form-control form-control-sm" id="f_cedula" placeholder="Cédula (V12345678)" value="${cedula}" required></div>
                    <div class="col-6"><input type="text" class="form-control form-control-sm" id="f_direccion" placeholder="Dirección" value="${direccion}" required></div>
                    <div class="col-6"><input type="email" class="form-control form-control-sm" id="f_email" placeholder="Correo" value="${email}" required></div>
                    <div class="col-6"><input type="tel" class="form-control form-control-sm" id="f_telefono" placeholder="Teléfono (04121234567)" value="${telefono}" required></div>
                </div>
                <button class="btn-enviar-datos" id="btnGuardarDatos">Guardar datos</button>
                <div id="errorDatos" class="error-text"></div>
            </div>
        `;
        addMessage('Por favor completa tus datos:', true, html);

        // Evento del botón guardar
        document.getElementById('btnGuardarDatos').addEventListener('click', function() {
            const nombre = document.getElementById('f_nombre').value.trim();
            const apellido = document.getElementById('f_apellido').value.trim();
            const cedula = document.getElementById('f_cedula').value.trim();
            const direccion = document.getElementById('f_direccion').value.trim();
            const email = document.getElementById('f_email').value.trim();
            const telefono = document.getElementById('f_telefono').value.trim();

            // Validaciones
            let errorMsg = '';
            if (!nombre) errorMsg += 'Nombre obligatorio. ';
            if (!apellido) errorMsg += 'Apellido obligatorio. ';
            if (!validarCedula(cedula)) errorMsg += 'Cédula inválida (ej: V12345678). ';
            if (!direccion) errorMsg += 'Dirección obligatoria. ';
            if (!validarEmail(email)) errorMsg += 'Email inválido. ';
            if (!validarTelefono(telefono)) errorMsg += 'Teléfono inválido (mínimo 10 dígitos). ';

            if (errorMsg) {
                document.getElementById('errorDatos').textContent = errorMsg;
                return;
            }

            // Guardar en userData y localStorage
            userData = { nombre, apellido, cedula, direccion, email, telefono };
            localStorage.setItem('solicitante_data', JSON.stringify(userData));

            // Confirmar y pasar a categoría
            addMessage('✅ Datos guardados correctamente.', false);
            addMessage('Ahora selecciona la <strong>categoría</strong> de tu solicitud.', true);
            setTimeout(() => mostrarCategorias(), 500);
        });
    }

    // ---------- PASO 2: CATEGORÍA ----------
    function mostrarCategorias() {
        step = 'categoria';
        const categorias = [
            { label: 'Educación, Cultura y Recreación', icon: 'fa-graduation-cap' },
            { label: 'Vivienda y Hábitat', icon: 'fa-home' },
            { label: 'Protección Social', icon: 'fa-hand-holding-heart' },
            { label: 'Salud', icon: 'fa-heartbeat' },
            { label: 'Economía Comunal y Socio-productiva', icon: 'fa-handshake' },
            { label: 'Agua y Servicios Públicos', icon: 'fa-tint' },
            { label: 'Seguridad y Defensa Integral', icon: 'fa-shield-alt' },
            { label: 'Ecosocialismo / Medio Ambiente', icon: 'fa-leaf' }
        ];

        let html = '<div style="display:flex; flex-wrap:wrap; gap:4px;">';
        categorias.forEach(cat => {
            html += `<button class="btn-categoria" data-categoria="${cat.label}"><i class="fas ${cat.icon}"></i> ${cat.label}</button>`;
        });
        html += '</div><div id="errorCategoria" class="error-text"></div>';

        addMessage('Selecciona una categoría:', true, html);

        // Eventos para los botones de categoría
        document.querySelectorAll('.btn-categoria').forEach(btn => {
            btn.addEventListener('click', function() {
                const selected = this.getAttribute('data-categoria');
                categoriaSeleccionada = selected;
                // Marcar visualmente
                document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('seleccionada'));
                this.classList.add('seleccionada');
                document.getElementById('errorCategoria').textContent = '';

                // Confirmar y pasar a descripción
                addMessage(`📌 Has seleccionado: <strong>${selected}</strong>`, false);
                addMessage('Ahora describe tu solicitud en detalle (mínimo 10 caracteres).', true);
                setTimeout(() => mostrarDescripcion(), 500);
            });
        });
    }

    // ---------- PASO 3: DESCRIPCIÓN ----------
    function mostrarDescripcion() {
        step = 'descripcion';
        const html = `
            <div>
                <textarea id="f_descripcion" rows="3" style="width:100%; padding:8px; border-radius:10px; border:2px solid #ddd;" placeholder="Describe tu solicitud..."></textarea>
                <div id="errorDescripcion" class="error-text"></div>
                <button class="btn-enviar-datos" id="btnConfirmarDescripcion">Confirmar descripción</button>
            </div>
        `;
        addMessage('Escribe tu solicitud:', true, html);

        document.getElementById('btnConfirmarDescripcion').addEventListener('click', function() {
            const desc = document.getElementById('f_descripcion').value.trim();
            if (desc.length < 10) {
                document.getElementById('errorDescripcion').textContent = 'La descripción debe tener al menos 10 caracteres.';
                return;
            }
            descripcionEscrita = desc;
            addMessage('📝 Descripción: ' + desc, false);
            addMessage('✅ Todo listo. Revisa los datos y presiona <strong>Finalizar</strong> para enviar tu solicitud.', true);
            // Mostrar botón finalizar
            mostrarBotonFinalizar();
        });
    }

    // ---------- PASO 4: BOTÓN FINALIZAR ----------
    function mostrarBotonFinalizar() {
        step = 'final';
        const html = `
            <button class="btn-finalizar" id="btnFinalizar">📨 Finalizar y enviar solicitud</button>
            <div id="errorFinal" class="error-text"></div>
        `;
        addMessage('', true, html);

        document.getElementById('btnFinalizar').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';

            try {
                const solicitud = {
                    nombre: userData.nombre,
                    apellido: userData.apellido,
                    cedula: userData.cedula,
                    direccion: userData.direccion,
                    email: userData.email,
                    telefono: userData.telefono.replace(/\D/g, ''),
                    categoria: categoriaSeleccionada,
                    descripcion: descripcionEscrita,
                    timestamp_solicitud: firebase.firestore.FieldValue.serverTimestamp(),
                    estado: 'pendiente',
                    timestamp_respuesta: null,
                    respuesta: null
                };

                await db.collection('solicitudes').add(solicitud);

                addMessage('✅ <strong>¡Solicitud enviada con éxito!</strong>', false);
                addMessage('El consejo comunal la revisará y te responderá al correo.', true);
                // Resetear flujo (pero mantener datos)
                step = 'inicio';
                categoriaSeleccionada = '';
                descripcionEscrita = '';
                // Ocultar el botón finalizar (ya no se necesita)
                btn.style.display = 'none';
                // Mostrar opción para nueva solicitud
                addMessage('¿Quieres hacer otra solicitud? Haz clic en "Nueva solicitud"', true);
                const htmlNew = `<button class="btn-enviar-datos" id="btnNuevaSolicitud">🔄 Nueva solicitud</button>`;
                addMessage('', true, htmlNew);
                document.getElementById('btnNuevaSolicitud').addEventListener('click', function() {
                    iniciarFlujo();
                });

            } catch (error) {
                console.error(error);
                document.getElementById('errorFinal').textContent = 'Error al enviar. Intenta de nuevo.';
                btn.disabled = false;
                btn.textContent = '📨 Finalizar y enviar solicitud';
            }
        });
    }

    // ============================================================
    // VALIDACIONES (igual que antes)
    // ============================================================
    function validarCedula(cedula) {
        return /^[VEve]\d{5,8}$/.test(cedula);
    }
    function validarEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    function validarTelefono(tel) {
        return tel.replace(/\D/g, '').length >= 10 && tel.replace(/\D/g, '').length <= 11;
    }

    // ============================================================
    // EVENTOS DEL WIDGET
    // ============================================================
    toggleBtn.addEventListener('click', function() {
        if (chatWindow.classList.contains('open')) {
            closeChat();
        } else {
            openChat();
        }
    });

    closeBtn.addEventListener('click', closeChat);

    // Al cargar la página, si hay datos en localStorage, iniciar flujo automáticamente al abrir
    // No lo iniciamos hasta que el usuario abra el chat.
    // Mostrar badge de notificación (opcional)
    // Podríamos mostrar un badge si hay solicitudes pendientes (pero eso es para otra funcionalidad)

    // Inicialización: el chat permanece cerrado, pero preparamos el step
    step = 'inicio';
    // Si se abre, se ejecuta iniciarFlujo()
</script>

</body>
</html>
